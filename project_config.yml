# Project Configuration for LLMOps Course

# Development environment
dev:
  catalog: site
  schema: ai_library_dev
  volume: arxiv_files
  llm_endpoint: databricks-qwen3-next-80b-a3b-instruct
  embedding_endpoint: databricks-gte-large-en
  warehouse_id: f5ee17e6049d7cfb
  vector_search_endpoint: llmops_course_vs_endpoint
  genie_space_id: 01f1315002321eed9477cd90308b379b
  # List of arXiv categories: https://arxiv.org/category_taxonomy
  arxiv_query: "cat:cs.LG AND {{time}}"
  max_pdf_files: 1
  usage_policy_id: 48d2738f-ced9-4957-a53e-b0def522b61e
  lakebase_project_id: arxiv-agent-lakebase
  experiment_name: /Shared/arxiv-curator-course

# Acceptance/Staging environment
acc:
  catalog: llmops_dev
  schema: ai_library_acc
  volume: arxiv_files
  llm_endpoint: databricks-qwen3-next-80b-a3b-instruct
  embedding_endpoint: databricks-gte-large-en
  warehouse_id: 7077f4cb0e616c62
  vector_search_endpoint: llmops_course_vs_endpoint
  genie_space_id: 01f1315002321eed9477cd90308b379b
  arxiv_query: "cat:cs.LG AND {{time}}"
  max_pdf_files: 5
  usage_policy_id: 48d2738f-ced9-4957-a53e-b0def522b61e
  lakebase_project_id: arxiv-agent-lakebase
  experiment_name: /Shared/arxiv-curator-course

# Production environment
prd:
  catalog: llmops_dev
  schema: ai_library_prd
  volume: arxiv_files
  llm_endpoint: databricks-qwen3-next-80b-a3b-instruct
  embedding_endpoint: databricks-gte-large-en
  warehouse_id: 7077f4cb0e616c62
  vector_search_endpoint: llmops_course_vs_endpoint
  genie_space_id: 01f1315002321eed9477cd90308b379b
  arxiv_query: "cat:cs.LG AND {{time}}"
  max_pdf_files: 5
  usage_policy_id: 48d2738f-ced9-4957-a53e-b0def522b61e
  lakebase_project_id: arxiv-agent-lakebase
  experiment_name: /Shared/arxiv-curator-course

# Model configuration
model_config:
  temperature: 0.7
  max_tokens: 2000
  top_p: 0.95

# Vector search configuration
vector_search:
  embedding_dimension: 1024
  similarity_metric: cosine
  num_results: 5

# Chunking configuration
chunking:
  chunk_size: 512
  chunk_overlap: 50
  separator: "\n\n"
