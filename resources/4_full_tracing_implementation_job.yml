resources:
  jobs:
    4_full_tracing_implementation_job:
      name: 4_full_tracing_implementation
      tags:
        project_name: "arxiv-curator"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: 4_1_tracing_implementation
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/4.1.tracing_implementation.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"

        - task_key: 4_2_custom_agent
          depends_on:
            - task_key: 4_1_tracing_implementation
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/4.2.custom_agent.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"

        - task_key: 4_3_evaluation_theory
          depends_on:
            - task_key: 4_2_custom_agent
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/4.3.evaluation_theory.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"

        - task_key: 4_4_mlflow_log_register
          depends_on:
            - task_key: 4_3_evaluation_theory
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/4.4.mlflow_log_register.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"
